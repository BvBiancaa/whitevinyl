<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhiteVynil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111;
    --bg3: #181818;
    --card: #141414;
    --border: #2a2a2a;
    --accent: #c0392b;
    --accent2: #e74c3c;
    --text: #e8e0d8;
    --muted: #6b6460;
    --subtle: #3a3530;
    --font-title: 'Bebas Neue', sans-serif;
    --font-body: 'Crimson Pro', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  [data-theme="light"] {
    --bg: #f5f0ea;
    --bg2: #ede8e0;
    --bg3: #e5dfd5;
    --card: #faf7f3;
    --border: #d4cec6;
    --accent: #c0392b;
    --accent2: #e74c3c;
    --text: #1a1612;
    --muted: #7a726a;
    --subtle: #c8c0b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 18px;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: var(--font-title);
    font-size: 28px;
    letter-spacing: 0.08em;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo span {
    color: var(--accent);
  }
  .logo-icon {
    width: 28px;
    height: 28px;
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-title);
    font-size: 16px;
    color: var(--accent);
    transform: rotate(45deg);
    flex-shrink: 0;
  }
  .logo-icon-inner {
    transform: rotate(-45deg);
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .toggle-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  .toggle-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .toggle-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── HERO ── */
  .hero {
    padding: 80px 32px 60px;
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
  }
  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .hero-title {
    font-family: var(--font-title);
    font-size: clamp(60px, 10vw, 120px);
    letter-spacing: 0.06em;
    line-height: 0.9;
    color: var(--text);
    margin-bottom: 24px;
  }
  .hero-title span { color: var(--accent); }
  .hero-subtitle {
    font-family: var(--font-body);
    font-size: 20px;
    color: var(--muted);
    font-style: italic;
    font-weight: 300;
    margin-bottom: 48px;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    max-width: 640px;
    margin: 0 auto;
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 20px;
    padding: 18px 56px 18px 24px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    border-radius: 0;
  }
  .search-input::placeholder { color: var(--muted); font-style: italic; }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.12);
  }
  .search-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-family: var(--font-mono);
    font-size: 16px;
  }
  .search-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 10px;
    text-align: left;
    padding-left: 4px;
  }

  /* ── MAIN LAYOUT ── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 32px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: var(--font-title);
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .section-count {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
  }

  /* ── ALBUM LIST ── */
  #albums-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 2px;
  }

  .album-card {
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    display: block;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .album-card:hover {
    border-color: var(--accent);
    z-index: 1;
  }
  .album-card:hover .card-overlay { opacity: 1; }
  .album-card:hover .card-cover { transform: scale(1.04); }

  .card-cover-wrap {
    aspect-ratio: 1;
    overflow: hidden;
    background: var(--bg3);
  }
  .card-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
    display: block;
  }
  .card-cover-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-title);
    font-size: 48px;
    color: var(--subtle);
    background: var(--bg3);
  }

  .card-overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    aspect-ratio: 1;
    background: linear-gradient(to bottom, transparent 40%, rgba(10,10,10,0.9));
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    padding: 16px;
  }
  .card-play {
    background: var(--accent);
    color: white;
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
  }

  .card-info {
    padding: 14px 16px 16px;
    border-top: 1px solid var(--border);
  }
  .card-artist {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .card-album {
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 8px;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-year {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
  }
  .card-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--muted);
    border: 1px solid var(--subtle);
    padding: 2px 6px;
    text-transform: uppercase;
  }

  /* ── LOADING / EMPTY / ERROR ── */
  .state-msg {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-style: italic;
    grid-column: 1/-1;
  }
  .state-msg .big {
    font-family: var(--font-title);
    font-size: 48px;
    color: var(--subtle);
    display: block;
    margin-bottom: 12px;
    letter-spacing: 0.1em;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--subtle);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── DIVIDER (alphabet) ── */
  .alpha-divider {
    grid-column: 1/-1;
    font-family: var(--font-title);
    font-size: 48px;
    letter-spacing: 0.1em;
    color: var(--subtle);
    padding: 24px 0 8px;
    border-top: 1px solid var(--border);
    margin-top: 16px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    gap: 32px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .stats-bar span { color: var(--accent); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--subtle); }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .hero { padding: 48px 16px 40px; }
    main { padding: 0 16px 60px; }
    #albums-list { grid-template-columns: repeat(2, 1fr); }
    .hero-title { font-size: 56px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <div class="logo-icon"><span class="logo-icon-inner">M</span></div>
    WHITE <span>VYNIL</span>
  </a>
  <div class="header-controls">
    <button class="toggle-btn" id="lang-toggle">EN</button>
    <button class="toggle-btn" id="theme-toggle">☀</button>
  </div>
</header>

<div class="hero">
  <p class="hero-eyebrow" data-it="Archivio musicale" data-en="Music archive">Archivio musicale</p>
  <h1 class="hero-title">WHITE<br><span>VYNIL</span></h1>
  <p class="hero-subtitle" data-it="La mia raccolta personale di album." data-en="My personal album collection.">
    La mia raccolta personale di album.
  </p>
  <div class="search-wrap">
    <input
      class="search-input"
      id="search"
      type="text"
      data-placeholder-it="Cerca artista, album, canzone, testo…"
      data-placeholder-en="Search artist, album, song, lyrics…"
      placeholder="Cerca artista, album, canzone, testo…"
      autocomplete="off"
    >
    <span class="search-icon">⌕</span>
    <p class="search-hint" data-it="Ricerca tollerante agli errori di battitura" data-en="Typo-tolerant search">
      Ricerca tollerante agli errori di battitura
    </p>
  </div>
</div>

<main>
  <div class="section-header">
    <span class="section-title" data-it="Tutti gli album" data-en="All albums">Tutti gli album</span>
    <span class="section-count" id="count">…</span>
  </div>
  <div id="albums-list">
    <div class="state-msg">
      <div class="spinner"></div>
      <span class="big" data-it="CARICAMENTO" data-en="LOADING">CARICAMENTO</span>
    </div>
  </div>
</main>

<div class="stats-bar" id="stats-bar">
  <span>WhiteVynil</span>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const SUPABASE_URL = 'https://yxjqrcupvlbduvcixudu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4anFyY3VwdmxiZHV2Y2l4dWR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODUyNTcsImV4cCI6MjA5MTY2MTI1N30.rd_Ng1QhZC3556bNUjkpe0uAcnIsJfgf6N3-FcQWWE0'; // anon key
// ────────────────────────────────────────────────────────

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// const DEMO_ALBUMS = [
//   {
//     slug: 'black-sabbath-black-sabbath',
//     artist: 'Black Sabbath',
//     album: 'Black Sabbath',
//     year: 1970,
//     genre: ['Heavy Metal', 'Doom Metal'],
//     tags: ['debut', 'classic', 'doom'],
//     cover_url: 'https://upload.wikimedia.org/wikipedia/en/thumb/4/43/Black_Sabbath_-_Black_Sabbath.png/220px-Black_Sabbath_-_Black_Sabbath.png',
//   }
// ];

// ── STATE ───────────────────────────────────────────────
let allAlbums = [];
let fuse = null;
let lang = localStorage.getItem('ma-lang') || 'it';
let theme = localStorage.getItem('ma-theme') || 'dark';
let stats = JSON.parse(localStorage.getItem('ma-stats') || '{}');

// ── I18N ─────────────────────────────────────────────────
function applyLang() {
  document.querySelectorAll('[data-it]').forEach(el => {
    el.textContent = lang === 'it' ? el.dataset.it : el.dataset.en;
  });
  document.querySelectorAll('[data-placeholder-it]').forEach(el => {
    el.placeholder = lang === 'it' ? el.dataset.placeholderIt : el.dataset.placeholderEn;
  });
  document.getElementById('lang-toggle').textContent = lang === 'it' ? 'EN' : 'IT';
  document.documentElement.lang = lang;
}

// ── THEME ────────────────────────────────────────────────
function applyTheme() {
  document.documentElement.dataset.theme = theme === 'light' ? 'light' : '';
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀' : '☾';
}

// ── FETCH ALBUMS ─────────────────────────────────────────
async function fetchAlbums() {
  // Prova Supabase; se fallisce usa demo
  if (SUPABASE_URL.includes('TUO-PROGETTO')) {
    allAlbums = DEMO_ALBUMS;
    renderAll(allAlbums);
    return;
  }
  try {
    const { data, error } = await db
      .from('albums')
      .select('slug, artist, album, year, genre, tags, cover_url')
      .order('artist', { ascending: true });
    if (error) throw error;
    allAlbums = data;
    renderAll(allAlbums);
  } catch (e) {
    console.warn('Supabase fallback:', e.message);
    allAlbums = DEMO_ALBUMS;
    renderAll(allAlbums);
  }
}

// ── FUSE.JS SETUP ────────────────────────────────────────
function setupFuse(albums) {
  fuse = new Fuse(albums, {
    keys: [
      { name: 'artist', weight: 3 },
      { name: 'album', weight: 3 },
      { name: 'genre', weight: 1 },
      { name: 'tags', weight: 1 },
    ],
    threshold: 0.4,
    includeScore: true,
  });
}

// ── RENDER ───────────────────────────────────────────────
function renderAll(albums) {
  setupFuse(albums);
  const count = document.getElementById('count');
  count.textContent = `${albums.length} ${lang === 'it' ? 'album' : 'albums'}`;
  updateStats(albums.length);

  const list = document.getElementById('albums-list');
  if (!albums.length) {
    list.innerHTML = `<div class="state-msg">
      <span class="big">∅</span>
      <span data-it="Nessun album trovato" data-en="No albums found">${lang === 'it' ? 'Nessun album trovato' : 'No albums found'}</span>
    </div>`;
    return;
  }

  // Raggruppa per lettera
  let html = '';
  let currentLetter = '';
  albums.forEach(a => {
    const letter = a.artist[0].toUpperCase();
    if (letter !== currentLetter) {
      currentLetter = letter;
      html += `<div class="alpha-divider">${letter}</div>`;
    }
    html += renderCard(a);
  });
  list.innerHTML = html;
}

function renderCard(a) {
  const views = stats[a.slug] || 0;
  const coverHtml = a.cover_url
    ? `<img class="card-cover" src="${a.cover_url}" alt="${a.album}" loading="lazy">`
    : `<div class="card-cover-placeholder">♩</div>`;

  const genreTags = (a.genre || []).slice(0,2).map(g =>
    `<span class="tag">${g}</span>`
  ).join('');

  return `
    <a class="album-card" href="album.html?slug=${a.slug}" onclick="trackView('${a.slug}')">
      <div class="card-cover-wrap">
        ${coverHtml}
        <div class="card-overlay">
          <span class="card-play">${lang === 'it' ? 'APRI' : 'OPEN'} →</span>
        </div>
      </div>
      <div class="card-info">
        <p class="card-artist">${a.artist}</p>
        <p class="card-album">${a.album}</p>
        <div class="card-meta">
          <span class="card-year">${a.year || '—'}</span>
          <div class="card-tags">${genreTags}</div>
        </div>
      </div>
    </a>`;
}

// ── SEARCH ───────────────────────────────────────────────
let searchTimeout;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = e.target.value.trim();
    if (!q) {
      renderAll(allAlbums);
      return;
    }
    const results = fuse.search(q).map(r => r.item);
    renderAll(results);
  }, 180);
});

// ── STATS ────────────────────────────────────────────────
function trackView(slug) {
  stats[slug] = (stats[slug] || 0) + 1;
  localStorage.setItem('ma-stats', JSON.stringify(stats));
}

function updateStats(total) {
  const totalViews = Object.values(stats).reduce((a,b) => a+b, 0);
  document.getElementById('stats-bar').innerHTML = `
    <span>WhiteVynil</span>
    <span>${lang === 'it' ? 'ALBUM' : 'ALBUMS'}: <span>${total}</span></span>
    <span>${lang === 'it' ? 'VISITE' : 'VIEWS'}: <span>${totalViews}</span></span>
    <span>${lang === 'it' ? 'SESSIONE' : 'SESSION'}: <span>${new Date().getFullYear()}</span></span>
  `;
}

// ── CONTROLS ─────────────────────────────────────────────
document.getElementById('lang-toggle').addEventListener('click', () => {
  lang = lang === 'it' ? 'en' : 'it';
  localStorage.setItem('ma-lang', lang);
  applyLang();
  if (allAlbums.length) renderAll(allAlbums);
});

document.getElementById('theme-toggle').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ma-theme', theme);
  applyTheme();
});

// ── INIT ─────────────────────────────────────────────────
applyLang();
applyTheme();
fetchAlbums();
</script>
</body>
</html>
